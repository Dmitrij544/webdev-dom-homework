<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">0</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">0</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea 
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";
    // Добавление комментария
    const nameInput = document.querySelector('.add-form-name');
    const textInput = document.querySelector('.add-form-text');
    const btn = document.querySelector('.add-form-button');
    const commentsContainer = document.querySelector('.comments') || document.body;

    function checkInputs() {
        btn.disabled = !(nameInput.value.trim() && textInput.value.trim());
    }

    btn.addEventListener('click', () => {
        const date = new Date().toLocaleString().slice(0, -3).replace(',', '');
        const newComment = document.createElement('div');
            newComment.classList.add('comment'); 

            newComment.innerHTML = `
                <div class="comment-header">
                    <div>${nameInput.value}</div>
                    <div>${date}</div>
                </div>
                <div class="comment-body">
                    <div class="comment-text">
                        ${textInput.value}
                    </div>
                </div>
                <div class="comment-footer">
                    <div class="likes">
                        <span class="likes-counter">0</span>
                        <button class="like-button"></button>
                    </div>
                </div>
            `;

            commentsContainer.appendChild(newComment);

            nameInput.value = '';
            textInput.value = '';
            checkInputs();
    });

    nameInput.addEventListener('input', checkInputs);
    textInput.addEventListener('input', checkInputs);

    checkInputs();

    // Добавление лайка
    commentsContainer.addEventListener('click', (event) => {
        const likeBtn = event.target.closest('.like-button');
        if (!likeBtn) return; 

        const likeBlock = likeBtn.closest('.likes');
        const likeCount = likeBlock.querySelector('.likes-counter');

        const commentData = {
            likes: parseInt(likeCount.textContent) || 0,
            isLiked: likeBtn.classList.contains('-active-like')
        };

        if (!commentData.isLiked) {
            commentData.likes++;
            commentData.isLiked = true;
        } else {
            commentData.likes--;
            commentData.isLiked = false;
        }

        likeBtn.className = `like-button ${commentData.isLiked ? '-active-like' : ''}`;

        likeCount.textContent = commentData.likes;
    });
  </script>
</html>
